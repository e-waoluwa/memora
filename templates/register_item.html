{% extends "base.html" %}
{% block title %}Memora — Register Item{% endblock %}

{% block head %}
<style>
    .register-wrap {
        max-width: 500px;
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .photo-box {
        width: 100%;
        aspect-ratio: 4/3;
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    .photo-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
    }

    .photo-placeholder {
        text-align: center;
        color: var(--text-muted);
    }

    .photo-placeholder .icon { font-size: 48px; margin-bottom: 10px; }

    .photo-placeholder p {
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    .status-msg {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
        min-height: 24px;
        transition: color 0.3s;
    }
    .status-msg.ok    { color: var(--accent); }
    .status-msg.error { color: var(--danger); }

    .name-row { display: flex; gap: 8px; }
    .name-row input { flex: 1; }

    #file-input { display: none; }
</style>
{% endblock %}

{% block content %}
<div class="page">
    <div class="section-label">Memory Registration</div>
    <div class="section-title">Register New Item</div>

    <div class="register-wrap">

        <!-- Photo preview -->
        <div class="photo-box" id="photo-box">
            <div class="photo-placeholder" id="placeholder">
                <div class="icon">👁️</div>
                <p>No photo yet</p>
            </div>
            <img id="preview" alt="preview">
        </div>

        <!-- Take photo button -->
        <input type="file" id="file-input" accept="image/*" capture="environment">
        <button class="btn btn-primary" onclick="takePhoto()" style="justify-content:center; width:100%;">
            📸 &nbsp;Take Photo
        </button>

        <!-- Name + save -->
        <div class="name-row">
            <input id="item-name" type="text" placeholder="Name this item... e.g. my keys">
            <button class="btn btn-primary" onclick="saveItem()">Save</button>
        </div>

        <div class="status-msg" id="status"></div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let photoB64 = null;

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className   = 'status-msg ' + (type || '');
    }

    function takePhoto() {
        const input = document.getElementById('file-input');
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const img  = new Image();
            img.onload = function() {
                // compress to 640x480
                const canvas = document.createElement('canvas');
                canvas.width  = 640;
                canvas.height = 480;
                canvas.getContext('2d').drawImage(img, 0, 0, 640, 480);

                const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                photoB64      = dataUrl.split(',')[1];

                // show preview
                const preview = document.getElementById('preview');
                preview.src   = dataUrl;
                preview.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';

                setStatus('Photo ready — enter a name and save', 'ok');
            };
            img.src = URL.createObjectURL(file);
        };
        input.click();
    }

    function saveItem() {
        const name = document.getElementById('item-name').value.trim();

        if (!name) {
            setStatus('Enter a name first', 'error');
            return;
        }

        if (!photoB64) {
            setStatus('Take a photo first', 'error');
            return;
        }

        setStatus('Saving...', '');

        fetch('/save-item', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ name: name, photo_b64: photoB64 })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.status === 'ok') {
                setStatus('✓ ' + data.message, 'ok');
                photoB64 = null;
                document.getElementById('item-name').value = '';
                document.getElementById('preview').style.display = 'none';
                document.getElementById('placeholder').style.display = 'block';
            } else {
                setStatus(data.message || 'Error saving', 'error');
            }
        })
        .catch(function(err) {
            setStatus('Network error: ' + err, 'error');
        });
    }
</script>
{% endblock %}
